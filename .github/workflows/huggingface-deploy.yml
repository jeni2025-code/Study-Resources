name: Deploy Backend to Hugging Face Spaces

on:
  push:
    tags: [ "*" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Git for Hugging Face
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Push backend to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
        run: |
          # Clone the HF Space repo
          git clone https://$HF_USERNAME:$HF_TOKEN@huggingface.co/spaces/$HF_USERNAME/$HF_SPACE_NAME hf_space
          
          # Clear existing space contents (preserve .git)
          find hf_space -mindepth 1 -not -path 'hf_space/.git*' -delete

          # Copy backend files into the space
          cp -r backend/. hf_space/

          # Commit and push to Hugging Face
          cd hf_space
          git add .
          git commit -m "Deploy from GitHub tag ${{ github.ref_name }}" || echo "No changes to commit"
          git push
